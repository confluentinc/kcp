version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gocritic
    - misspell

formatters:
  enable:
    - gofmt

issues:
  new-from-rev: main
  exclude-dirs:
    - cmd/ui/frontend
    - dist
    - vendor
  exclude-files:
    - ".*\\.pb\\.go$"
