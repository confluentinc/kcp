site_name: KCP — Kafka Copy
site_description: CLI tool for planning and executing Kafka migrations from AWS MSK and Open Source Kafka to Confluent Cloud.
site_url: https://confluentinc.github.io/kcp/
repo_url: https://github.com/confluentinc/kcp
repo_name: confluentinc/kcp
edit_uri: edit/main/docs/

docs_dir: docs

exclude_docs: |
  brainstorms/
  ideation/
  plans/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - callouts
  # awesome-pages expands any directory referenced in `nav:` by reading its
  # contents, so the Command Reference subtree doesn't need to be hand-listed.
  # Must run before mike: nav construction has to finish before versioning.
  - awesome-pages
  # GitHub Pages rejects POSIX symlinks (mike's default on Linux), so the
  # `latest` alias must be a redirect stub instead. Without alias_type=redirect,
  # release deploys fail with "Failed to deploy site, please ensure the
  # repository does not contain any hard links, symlinks".
  - mike:
      alias_type: redirect

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

extra:
  version:
    provider: mike
    default: latest

# nav is controlled by docs/.pages (awesome-pages). The Command Reference
# subtree is inferred from docs/command-reference/ so new CLI commands appear
# in the sidebar automatically after `make docs-gen`.
