site_name: KCP — Kafka Copy
site_description: CLI tool for planning and executing Kafka migrations from AWS MSK and Open Source Kafka to Confluent Cloud.
site_url: https://confluentinc.github.io/kcp/
repo_url: https://github.com/confluentinc/kcp
repo_name: confluentinc/kcp
edit_uri: edit/main/docs/

docs_dir: docs

exclude_docs: |
  brainstorms/
  ideation/
  plans/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - callouts
  # GitHub Pages rejects POSIX symlinks (mike's default on Linux), so the
  # `latest` alias must be a redirect stub instead. Without alias_type=redirect,
  # release deploys fail with "Failed to deploy site, please ensure the
  # repository does not contain any hard links, symlinks".
  - mike:
      alias_type: redirect

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

extra:
  version:
    provider: mike
    default: latest

nav:
  - Home: README.md
  - Getting Started (Zero-Cut): getting-started-with-zero-cut-migrations.md
  - Command Reference:
      - Overview: command-reference/kcp.md
      - kcp discover: command-reference/kcp_discover.md
      - kcp scan:
          - Overview: command-reference/kcp_scan.md
          - clusters: command-reference/kcp_scan_clusters.md
          - client-inventory: command-reference/kcp_scan_client-inventory.md
          - schema-registry: command-reference/kcp_scan_schema-registry.md
      - kcp report:
          - Overview: command-reference/kcp_report.md
          - costs: command-reference/kcp_report_costs.md
          - metrics: command-reference/kcp_report_metrics.md
      - kcp create-asset:
          - Overview: command-reference/kcp_create-asset.md
          - bastion-host: command-reference/kcp_create-asset_bastion-host.md
          - target-infra: command-reference/kcp_create-asset_target-infra.md
          - migration-infra: command-reference/kcp_create-asset_migration-infra.md
          - migrate-topics: command-reference/kcp_create-asset_migrate-topics.md
          - migrate-schemas: command-reference/kcp_create-asset_migrate-schemas.md
          - migrate-acls:
              - Overview: command-reference/kcp_create-asset_migrate-acls.md
              - kafka: command-reference/kcp_create-asset_migrate-acls_kafka.md
              - iam: command-reference/kcp_create-asset_migrate-acls_iam.md
          - migrate-connectors:
              - Overview: command-reference/kcp_create-asset_migrate-connectors.md
              - msk: command-reference/kcp_create-asset_migrate-connectors_msk.md
              - self-managed: command-reference/kcp_create-asset_migrate-connectors_self-managed.md
              - connector-utility: command-reference/kcp_create-asset_migrate-connectors_connector-utility.md
      - kcp migration:
          - Overview: command-reference/kcp_migration.md
          - init: command-reference/kcp_migration_init.md
          - execute: command-reference/kcp_migration_execute.md
          - lag-check: command-reference/kcp_migration_lag-check.md
          - list: command-reference/kcp_migration_list.md
      - kcp ui: command-reference/kcp_ui.md
      - kcp update: command-reference/kcp_update.md
      - kcp version: command-reference/kcp_version.md
      - kcp docs: command-reference/kcp_docs.md
  - Gateway Switchover:
      - Examples: gateway-switchover-examples.md
      - none → mTLS: switchover-none-to-mtls/README.md
      - none → OAuth: switchover-none-to-oauth/README.md
      - none → SASL/PLAIN: switchover-none-to-saslplain/README.md
      - mTLS → mTLS: switchover-mtls-to-mtls/README.md
      - mTLS → OAuth: switchover-mtls-to-oauth/README.md
      - mTLS → SASL/PLAIN: switchover-mtls-to-sasl-plain/README.md
      - SASL/SCRAM → OAuth: switchover-sasl-scram-to-oauth/README.md
      - SASL/SCRAM → SASL/PLAIN: switchover-sasl-scram-to-sasl-plain/README.md
