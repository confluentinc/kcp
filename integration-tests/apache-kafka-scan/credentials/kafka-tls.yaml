clusters:
  - id: apache-kafka
    bootstrap_servers:
      - localhost:9094
    auth_method:
      tls:
        use: true
        ca_cert: integration-tests/apache-kafka-scan/certs/ca-cert.pem
        client_cert: integration-tests/apache-kafka-scan/certs/client-cert-signed.pem
        client_key: integration-tests/apache-kafka-scan/certs/client-key.pem
    metadata:
      environment: test
      location: apache-kafka-scan
