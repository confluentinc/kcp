services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: apache-kafka
    container_name: kcp-test-apache-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
      - "9094:9094"
      - "9095:9095"
      - "9098:9098"
      - "8778:8778"
    volumes:
      - ./kafka_server_jaas.conf:/etc/kafka/kafka_server_jaas.conf
      - ./certs:/etc/kafka/secrets
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@apache-kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://apache-kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092,SASL_HOST://0.0.0.0:9093,SSL_HOST://0.0.0.0:9094,SASL_SSL_HOST://0.0.0.0:9095,SASL_PLAIN_HOST://0.0.0.0:9098'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://apache-kafka:29092,PLAINTEXT_HOST://localhost:9092,SASL_HOST://localhost:9093,SSL_HOST://localhost:9094,SASL_SSL_HOST://localhost:9095,SASL_PLAIN_HOST://localhost:9098'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,SASL_HOST:SASL_SSL,SSL_HOST:SSL,SASL_SSL_HOST:SASL_SSL,SASL_PLAIN_HOST:SASL_PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      # SASL configuration
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-256,SCRAM-SHA-512,PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_OPTS: -Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf
      # SASL/PLAIN per-listener JAAS config (avoids modifying the shared JAAS file)
      KAFKA_LISTENER_NAME_SASL__PLAIN__HOST_PLAIN_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="admin"
        password="admin-secret"
        user_plainuser="plainpass";
      # SSL/TLS configuration
      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka.server.keystore.jks
      KAFKA_SSL_KEYSTORE_PASSWORD: keystorepass
      KAFKA_SSL_KEY_PASSWORD: keystorepass
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.server.truststore.jks
      KAFKA_SSL_TRUSTSTORE_PASSWORD: truststorepass
      KAFKA_SSL_CLIENT_AUTH: none
      KAFKA_LISTENER_NAME_SSL_HOST_SSL_CLIENT_AUTH: required
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ''
      # General
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'UnIfIeDtEsTcLuStErId01'
      # Authorization
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: 'true'
      KAFKA_SUPER_USERS: 'User:ANONYMOUS;User:admin;User:kafkauser;User:plainuser;User:CN=kafka-client,OU=Test,O=Test,L=San Francisco,ST=CA,C=US'
    command: >
      bash -c "
        echo 'Downloading Jolokia agent...'
        curl -sSL https://repo1.maven.org/maven2/org/jolokia/jolokia-jvm/1.7.2/jolokia-jvm-1.7.2.jar -o /tmp/jolokia-agent.jar

        kafka-storage format -t UnIfIeDtEsTcLuStErId01 -c /etc/kafka/kafka.properties --ignore-formatted 2>/dev/null || true

        KAFKA_OPTS=\"-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf -javaagent:/tmp/jolokia-agent.jar=port=8778,host=0.0.0.0\" /etc/confluent/docker/run &
        KAFKA_PID=$$!

        echo 'Waiting for Kafka to start...'
        MAX_WAIT=60
        WAIT_TIME=0
        while [ $$WAIT_TIME -lt $$MAX_WAIT ]; do
          if kafka-broker-api-versions --bootstrap-server localhost:29092 > /dev/null 2>&1; then
            break
          fi
          sleep 2
          WAIT_TIME=$$((WAIT_TIME + 2))
        done

        echo 'Creating SCRAM credentials...'
        kafka-configs --bootstrap-server localhost:29092 --alter --add-config 'SCRAM-SHA-256=[password=admin-secret]' --entity-type users --entity-name admin 2>/dev/null || true
        kafka-configs --bootstrap-server localhost:29092 --alter --add-config 'SCRAM-SHA-256=[password=kafkapass]' --entity-type users --entity-name kafkauser 2>/dev/null || true
        kafka-configs --bootstrap-server localhost:29092 --alter --add-config 'SCRAM-SHA-512=[password=admin-secret]' --entity-type users --entity-name admin 2>/dev/null || true
        kafka-configs --bootstrap-server localhost:29092 --alter --add-config 'SCRAM-SHA-512=[password=kafkapass]' --entity-type users --entity-name kafkauser 2>/dev/null || true
        echo 'SCRAM credentials created.'

        wait
      "

  kafka-sasl-sha512-only:
    image: confluentinc/cp-kafka:7.6.0
    hostname: apache-kafka-sasl-sha512-only
    container_name: kcp-test-apache-kafka-sasl-sha512-only
    ports:
      - "9099:9099"
    volumes:
      - ./kafka_server_jaas.conf:/etc/kafka/kafka_server_jaas.conf
      - ./certs:/etc/kafka/secrets
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@apache-kafka-sasl-sha512-only:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://apache-kafka-sasl-sha512-only:29093,SASL_HOST://0.0.0.0:9099'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://apache-kafka-sasl-sha512-only:29092,SASL_HOST://localhost:9099'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,SASL_HOST:SASL_SSL'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-512
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_OPTS: -Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf
      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka.server.keystore.jks
      KAFKA_SSL_KEYSTORE_PASSWORD: keystorepass
      KAFKA_SSL_KEY_PASSWORD: keystorepass
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.server.truststore.jks
      KAFKA_SSL_TRUSTSTORE_PASSWORD: truststorepass
      KAFKA_SSL_CLIENT_AUTH: none
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ''
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'Sha512OnLyTeStClUsTr01'
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: 'true'
      KAFKA_SUPER_USERS: 'User:ANONYMOUS;User:admin;User:kafkauser'
    command: >
      bash -c "
        kafka-storage format -t Sha512OnLyTeStClUsTr01 -c /etc/kafka/kafka.properties --ignore-formatted 2>/dev/null || true

        KAFKA_OPTS=\"-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf\" /etc/confluent/docker/run &
        KAFKA_PID=$$!

        echo 'Waiting for Kafka SHA-512-only broker to start...'
        MAX_WAIT=60
        WAIT_TIME=0
        while [ $$WAIT_TIME -lt $$MAX_WAIT ]; do
          if kafka-broker-api-versions --bootstrap-server localhost:29092 > /dev/null 2>&1; then
            break
          fi
          sleep 2
          WAIT_TIME=$$((WAIT_TIME + 2))
        done

        echo 'Creating SCRAM-SHA-512 credentials...'
        kafka-configs --bootstrap-server localhost:29092 --alter --add-config 'SCRAM-SHA-512=[password=admin-secret]' --entity-type users --entity-name admin 2>/dev/null || true
        kafka-configs --bootstrap-server localhost:29092 --alter --add-config 'SCRAM-SHA-512=[password=kafkapass]' --entity-type users --entity-name kafkauser 2>/dev/null || true
        echo 'SCRAM-SHA-512 credentials created.'

        wait
      "

  kafka-sasl-sha512-only-producer:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kcp-test-apache-kafka-sasl-sha512-only-producer
    depends_on:
      - kafka-sasl-sha512-only
    command:
      - bash
      - -c
      - |
        cub kafka-ready -b apache-kafka-sasl-sha512-only:29092 1 60
        kafka-producer-perf-test --topic test-topic-1 --throughput 100 --num-records 999999999 --record-size 1000 --producer-props bootstrap.servers=apache-kafka-sasl-sha512-only:29092

  kafka-sasl-sha512-only-consumer:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kcp-test-apache-kafka-sasl-sha512-only-consumer
    depends_on:
      - kafka-sasl-sha512-only
    command:
      - bash
      - -c
      - |
        cub kafka-ready -b apache-kafka-sasl-sha512-only:29092 1 60
        kafka-console-consumer --bootstrap-server apache-kafka-sasl-sha512-only:29092 --topic test-topic-1 --group apache-kafka-sasl-sha512-only-consumer > /dev/null

  kafka-producer:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kcp-test-apache-kafka-producer
    depends_on:
      - kafka
    command:
      - bash
      - -c
      - |
        cub kafka-ready -b apache-kafka:29092 1 60
        kafka-producer-perf-test --topic test-topic-1 --throughput 100 --num-records 999999999 --record-size 1000 --producer-props bootstrap.servers=apache-kafka:29092

  kafka-consumer:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kcp-test-apache-kafka-consumer
    depends_on:
      - kafka
    command:
      - bash
      - -c
      - |
        cub kafka-ready -b apache-kafka:29092 1 60
        kafka-console-consumer --bootstrap-server apache-kafka:29092 --topic test-topic-1 --group apache-kafka-test-consumer > /dev/null

  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.0
    hostname: apache-kafka-connect
    container_name: kcp-test-apache-kafka-connect
    profiles:
      - connect
    depends_on:
      - kafka
    ports:
      - "8083:8083"
      - "8781:8781"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: 'apache-kafka:29092'
      CONNECT_REST_ADVERTISED_HOST_NAME: 'localhost'
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: 'connect-cluster'
      CONNECT_CONFIG_STORAGE_TOPIC: 'connect-configs'
      CONNECT_OFFSET_STORAGE_TOPIC: 'connect-offsets'
      CONNECT_STATUS_STORAGE_TOPIC: 'connect-status'
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: 'org.apache.kafka.connect.json.JsonConverter'
      CONNECT_VALUE_CONVERTER: 'org.apache.kafka.connect.json.JsonConverter'
      CONNECT_PLUGIN_PATH: '/usr/share/java,/usr/share/confluent-hub-components'
    command:
      - bash
      - -c
      - |
        echo "Waiting for Kafka to be ready..."
        cub kafka-ready -b apache-kafka:29092 1 120

        echo "Downloading Jolokia agent..."
        curl -sSL https://repo1.maven.org/maven2/org/jolokia/jolokia-jvm/1.7.2/jolokia-jvm-1.7.2.jar -o /tmp/jolokia-agent.jar

        echo "Starting Kafka Connect with Jolokia..."
        export KAFKA_OPTS="-javaagent:/tmp/jolokia-agent.jar=port=8781,host=0.0.0.0"
        /etc/confluent/docker/run &
        CONNECT_PID=$$!

        echo "Waiting for Connect to start..."
        MAX_WAIT=60
        WAIT_TIME=0
        while [ $$WAIT_TIME -lt $$MAX_WAIT ]; do
          if curl -s http://localhost:8083/ > /dev/null 2>&1; then
            echo "Connect is ready"
            break
          fi
          sleep 2
          WAIT_TIME=$$((WAIT_TIME + 2))
        done

        wait $$CONNECT_PID

  kafka-jmx-auth:
    image: confluentinc/cp-kafka:7.6.0
    hostname: apache-kafka-jmx-auth
    container_name: kcp-test-apache-kafka-jmx-auth
    ports:
      - "9096:9096"
      - "8779:8779"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@apache-kafka-jmx-auth:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://apache-kafka-jmx-auth:29092,CONTROLLER://apache-kafka-jmx-auth:29093,PLAINTEXT_HOST://0.0.0.0:9096'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://apache-kafka-jmx-auth:29092,PLAINTEXT_HOST://localhost:9096'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'JmxAuThTeStClUsTerId01'
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: 'true'
      KAFKA_SUPER_USERS: 'User:ANONYMOUS'
    command: >
      bash -c "
        curl -sSL https://repo1.maven.org/maven2/org/jolokia/jolokia-jvm/1.7.2/jolokia-jvm-1.7.2.jar -o /tmp/jolokia-agent.jar

        kafka-storage format -t JmxAuThTeStClUsTerId01 -c /etc/kafka/kafka.properties --ignore-formatted 2>/dev/null || true

        KAFKA_OPTS=\"-javaagent:/tmp/jolokia-agent.jar=port=8779,host=0.0.0.0,user=monitorUser,password=monitorPass\" /etc/confluent/docker/run &
        KAFKA_PID=$$!

        echo 'Waiting for Kafka JMX-auth to start...'
        MAX_WAIT=60
        WAIT_TIME=0
        while [ $$WAIT_TIME -lt $$MAX_WAIT ]; do
          if kafka-broker-api-versions --bootstrap-server localhost:29092 > /dev/null 2>&1; then
            break
          fi
          sleep 2
          WAIT_TIME=$$((WAIT_TIME + 2))
        done

        wait
      "

  kafka-jmx-auth-producer:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kcp-test-apache-kafka-jmx-auth-producer
    depends_on:
      - kafka-jmx-auth
    command:
      - bash
      - -c
      - |
        cub kafka-ready -b apache-kafka-jmx-auth:29092 1 60
        kafka-producer-perf-test --topic test-topic-1 --throughput 100 --num-records 999999999 --record-size 1000 --producer-props bootstrap.servers=apache-kafka-jmx-auth:29092

  kafka-jmx-auth-consumer:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kcp-test-apache-kafka-jmx-auth-consumer
    depends_on:
      - kafka-jmx-auth
    command:
      - bash
      - -c
      - |
        cub kafka-ready -b apache-kafka-jmx-auth:29092 1 60
        kafka-console-consumer --bootstrap-server apache-kafka-jmx-auth:29092 --topic test-topic-1 --group apache-kafka-jmx-auth-consumer > /dev/null

  kafka-jmx-tls:
    image: confluentinc/cp-kafka:7.6.0
    hostname: apache-kafka-jmx-tls
    container_name: kcp-test-apache-kafka-jmx-tls
    ports:
      - "9097:9097"
      - "8780:8780"
    volumes:
      - ./certs:/etc/kafka/secrets
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@apache-kafka-jmx-tls:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://apache-kafka-jmx-tls:29092,CONTROLLER://apache-kafka-jmx-tls:29093,PLAINTEXT_HOST://0.0.0.0:9097'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://apache-kafka-jmx-tls:29092,PLAINTEXT_HOST://localhost:9097'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'JmxTlSTeStClUsTerId001'
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: 'true'
      KAFKA_SUPER_USERS: 'User:ANONYMOUS'
    command: >
      bash -c "
        curl -sSL https://repo1.maven.org/maven2/org/jolokia/jolokia-jvm/1.7.2/jolokia-jvm-1.7.2.jar -o /tmp/jolokia-agent.jar

        kafka-storage format -t JmxTlSTeStClUsTerId001 -c /etc/kafka/kafka.properties --ignore-formatted 2>/dev/null || true

        KAFKA_OPTS=\"-javaagent:/tmp/jolokia-agent.jar=port=8780,host=0.0.0.0,user=monitorUser,password=monitorPass,protocol=https,keystore=/etc/kafka/secrets/kafka.server.keystore.jks,keystorePassword=keystorepass\" /etc/confluent/docker/run &
        KAFKA_PID=$$!

        echo 'Waiting for Kafka JMX-TLS to start...'
        MAX_WAIT=60
        WAIT_TIME=0
        while [ $$WAIT_TIME -lt $$MAX_WAIT ]; do
          if kafka-broker-api-versions --bootstrap-server localhost:29092 > /dev/null 2>&1; then
            break
          fi
          sleep 2
          WAIT_TIME=$$((WAIT_TIME + 2))
        done

        wait
      "

  kafka-jmx-tls-producer:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kcp-test-apache-kafka-jmx-tls-producer
    depends_on:
      - kafka-jmx-tls
    command:
      - bash
      - -c
      - |
        cub kafka-ready -b apache-kafka-jmx-tls:29092 1 60
        kafka-producer-perf-test --topic test-topic-1 --throughput 100 --num-records 999999999 --record-size 1000 --producer-props bootstrap.servers=apache-kafka-jmx-tls:29092

  kafka-jmx-tls-consumer:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kcp-test-apache-kafka-jmx-tls-consumer
    depends_on:
      - kafka-jmx-tls
    command:
      - bash
      - -c
      - |
        cub kafka-ready -b apache-kafka-jmx-tls:29092 1 60
        kafka-console-consumer --bootstrap-server apache-kafka-jmx-tls:29092 --topic test-topic-1 --group apache-kafka-jmx-tls-consumer > /dev/null

  prometheus:
    image: prom/prometheus:v2.51.0
    hostname: apache-kafka-prometheus
    container_name: kcp-test-apache-kafka-prometheus
    ports:
      - "9290:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=60d'
    volumes:
      - apache-kafka-prometheus-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  prometheus-seeder:
    image: prom/prometheus:v2.51.0
    container_name: kcp-test-apache-kafka-prometheus-seeder
    depends_on:
      - prometheus
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Prometheus to be ready..."
        for i in $$(seq 1 30); do
          if wget -q -O /dev/null http://apache-kafka-prometheus:9090/-/ready 2>/dev/null; then
            echo "Prometheus is ready"
            break
          fi
          sleep 1
        done
        PROM_URL="http://apache-kafka-prometheus:9090" /bin/sh /scripts/seed-prometheus-data.sh
        echo "Seeding complete"
    volumes:
      - apache-kafka-prometheus-data:/prometheus
      - ./seed-prometheus-data.sh:/scripts/seed-prometheus-data.sh:ro

  prometheus-auth:
    image: prom/prometheus:v2.51.0
    hostname: apache-kafka-prometheus-auth
    container_name: kcp-test-apache-kafka-prometheus-auth
    ports:
      - "9291:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=60d'
      - '--web.config.file=/etc/prometheus/web.yml'
    volumes:
      - apache-kafka-prometheus-auth-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./configs/prometheus-web-auth.yml:/etc/prometheus/web.yml:ro

  prometheus-auth-seeder:
    image: prom/prometheus:v2.51.0
    container_name: kcp-test-apache-kafka-prometheus-auth-seeder
    depends_on:
      - prometheus-auth
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Prometheus auth to be ready..."
        for i in $$(seq 1 30); do
          if wget -q -O /dev/null --user promuser --password prompass http://apache-kafka-prometheus-auth:9090/-/ready 2>/dev/null; then
            echo "Prometheus auth is ready"
            break
          fi
          sleep 1
        done
        PROM_URL="http://apache-kafka-prometheus-auth:9090" /bin/sh /scripts/seed-prometheus-data.sh
        echo "Seeding complete"
    volumes:
      - apache-kafka-prometheus-auth-data:/prometheus
      - ./seed-prometheus-data.sh:/scripts/seed-prometheus-data.sh:ro

  prometheus-tls:
    image: prom/prometheus:v2.51.0
    hostname: apache-kafka-prometheus-tls
    container_name: kcp-test-apache-kafka-prometheus-tls
    ports:
      - "9292:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=60d'
      - '--web.config.file=/etc/prometheus/web.yml'
    volumes:
      - apache-kafka-prometheus-tls-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./configs/prometheus-web-tls.yml:/etc/prometheus/web.yml:ro
      - ./certs/prometheus-server.crt:/etc/prometheus/certs/server.crt:ro
      - ./certs/prometheus-server.key:/etc/prometheus/certs/server.key:ro

  prometheus-tls-seeder:
    image: prom/prometheus:v2.51.0
    container_name: kcp-test-apache-kafka-prometheus-tls-seeder
    depends_on:
      - prometheus-tls
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Prometheus TLS to be ready..."
        for i in $$(seq 1 30); do
          if wget -q -O /dev/null --no-check-certificate --user promuser --password prompass https://apache-kafka-prometheus-tls:9090/-/ready 2>/dev/null; then
            echo "Prometheus TLS is ready"
            break
          fi
          sleep 1
        done
        PROM_URL="https://apache-kafka-prometheus-tls:9090" /bin/sh /scripts/seed-prometheus-data.sh
        echo "Seeding complete"
    volumes:
      - apache-kafka-prometheus-tls-data:/prometheus
      - ./seed-prometheus-data.sh:/scripts/seed-prometheus-data.sh:ro

volumes:
  apache-kafka-prometheus-data:
  apache-kafka-prometheus-auth-data:
  apache-kafka-prometheus-tls-data:
