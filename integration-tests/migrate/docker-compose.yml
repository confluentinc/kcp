services:
  source:
    image: confluentinc/cp-server:8.1.2
    hostname: source
    container_name: kcp-mcl-source
    ports: ["19092:19092", "19093:19093", "19094:19094", "19095:19095", "18090:8090"]
    volumes: ["./certs:/etc/kafka/secrets"]
    environment:
      CLUSTER_ID: '6ub6fPVJRzKjE4i-REkq-A'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@source:29093'
      # Listeners: HOST(PLAINTEXT,19092) + SASLSSL(SASL_SSL,19093) + SSL(19094) are
      # host-published for KCP's source read; INTERNAL + *_DOCKER are docker-network
      # listeners the link (running on dest) connects to (source:29092/29094/29095).
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,HOST://0.0.0.0:19092,SASLSSL://0.0.0.0:19093,SASLSSL_DOCKER://0.0.0.0:29094,SSL://0.0.0.0:19094,SSL_DOCKER://0.0.0.0:29095,SASLPLAIN://0.0.0.0:19095,SASLPLAIN_DOCKER://0.0.0.0:29096'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://source:29092,HOST://localhost:19092,SASLSSL://localhost:19093,SASLSSL_DOCKER://source:29094,SSL://localhost:19094,SSL_DOCKER://source:29095,SASLPLAIN://localhost:19095,SASLPLAIN_DOCKER://source:29096'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,HOST:PLAINTEXT,SASLSSL:SASL_SSL,SASLSSL_DOCKER:SASL_SSL,SSL:SSL,SSL_DOCKER:SSL,SASLPLAIN:SASL_PLAINTEXT,SASLPLAIN_DOCKER:SASL_PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_SASL_ENABLED_MECHANISMS: 'SCRAM-SHA-256,SCRAM-SHA-512,PLAIN'
      KAFKA_SSL_KEYSTORE_FILENAME: 'source.keystore.jks'
      KAFKA_SSL_KEYSTORE_CREDENTIALS: 'keystore_creds'
      KAFKA_SSL_KEY_CREDENTIALS: 'key_creds'
      KAFKA_SSL_TRUSTSTORE_FILENAME: 'source.truststore.jks'
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: 'truststore_creds'
      KAFKA_SSL_CLIENT_AUTH: 'requested'
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ''
      KAFKA_LISTENER_NAME_SASLSSL_PLAIN_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret" user_kcp="kcp-secret";'
      # SCRAM listener JAAS (empty module — validates against stored creds). The
      # cp image encodes dashes in the mechanism as triple underscores.
      KAFKA_LISTENER_NAME_SASLSSL_SCRAM___SHA___256_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.scram.ScramLoginModule required;'
      KAFKA_LISTENER_NAME_SASLSSL_SCRAM___SHA___512_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.scram.ScramLoginModule required;'
      # Same JAAS for the docker-network SASL_SSL listener (the one the link uses).
      KAFKA_LISTENER_NAME_SASLSSL__DOCKER_PLAIN_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret" user_kcp="kcp-secret";'
      KAFKA_LISTENER_NAME_SASLSSL__DOCKER_SCRAM___SHA___256_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.scram.ScramLoginModule required;'
      KAFKA_LISTENER_NAME_SASLSSL__DOCKER_SCRAM___SHA___512_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.scram.ScramLoginModule required;'
      # SASL_PLAINTEXT listeners (PLAIN, no TLS) — KCP reads PLAIN here (host) and
      # the link connects here (docker), matching KCP's WithSASLPlainAuthNoTLS.
      # Scope these listeners to PLAIN only so they don't require SCRAM JAAS
      # (SCRAM is globally enabled for the SASL_SSL listeners).
      KAFKA_LISTENER_NAME_SASLPLAIN_SASL_ENABLED_MECHANISMS: 'PLAIN'
      KAFKA_LISTENER_NAME_SASLPLAIN__DOCKER_SASL_ENABLED_MECHANISMS: 'PLAIN'
      KAFKA_LISTENER_NAME_SASLPLAIN_PLAIN_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret" user_kcp="kcp-secret";'
      KAFKA_LISTENER_NAME_SASLPLAIN__DOCKER_PLAIN_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret" user_kcp="kcp-secret";'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CONFLUENT_CLUSTER_LINK_ENABLE: 'true'
      KAFKA_CONFLUENT_HTTP_SERVER_LISTENERS: 'http://0.0.0.0:8090'
      # Single-broker: all Confluent internal topics must use RF=1 (default 3),
      # otherwise the cluster-link coordinator topics fail to create and the
      # link hangs in FIND_COORDINATOR.
      KAFKA_CONFLUENT_CLUSTER_LINK_METADATA_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_COMMAND_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_TELEMETRY_METRICS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_BALANCER_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_BALANCER_ENABLE: 'false'

  dest:
    image: confluentinc/cp-server:8.1.2
    hostname: dest
    container_name: kcp-mcl-dest
    ports: ["29092:29092", "28090:8090"]
    environment:
      CLUSTER_ID: 'LKsbYRvfTM-TVXKjdjgdxA'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@dest:29093'
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:39092,CONTROLLER://0.0.0.0:29093,HOST://0.0.0.0:29092'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://dest:39092,HOST://localhost:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CONFLUENT_CLUSTER_LINK_ENABLE: 'true'
      KAFKA_CONFLUENT_HTTP_SERVER_LISTENERS: 'http://0.0.0.0:8090'
      # Single-broker: all Confluent internal topics must use RF=1 (default 3),
      # otherwise the cluster-link coordinator topics fail to create and the
      # link hangs in FIND_COORDINATOR.
      KAFKA_CONFLUENT_CLUSTER_LINK_METADATA_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_COMMAND_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_TELEMETRY_METRICS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_BALANCER_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_BALANCER_ENABLE: 'false'

  # ---------------------------------------------------------------------------
  # dest-basic: destination broker whose embedded Admin REST API requires HTTP
  # Basic auth (Phase 3 target-REST auth surface). The REST app authenticates
  # via a Jetty PropertyFileLoginModule realm (rest-auth/rest-jaas.properties +
  # rest-password.properties). The link it creates still reaches the source over
  # the docker network (source:29092), same as the no-auth dest.
  # ---------------------------------------------------------------------------
  dest-basic:
    image: confluentinc/cp-server:8.1.2
    hostname: dest-basic
    container_name: kcp-mcl-dest-basic
    ports: ["29192:29192", "28091:8090"]
    volumes: ["./rest-auth:/etc/kafka/rest-auth"]
    environment:
      CLUSTER_ID: 'gFoyBzWLw8b-Q-4UDIXcvw'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@dest-basic:29093'
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:39092,CONTROLLER://0.0.0.0:29093,HOST://0.0.0.0:29192'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://dest-basic:39092,HOST://localhost:29192'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CONFLUENT_CLUSTER_LINK_ENABLE: 'true'
      KAFKA_CONFLUENT_HTTP_SERVER_LISTENERS: 'http://0.0.0.0:8090'
      # Embedded Admin REST API HTTP Basic auth (verified against CP docs):
      # method=BASIC + a JAAS realm whose name matches the realm property.
      KAFKA_OPTS: '-Djava.security.auth.login.config=/etc/kafka/rest-auth/rest-jaas.properties'
      KAFKA_KAFKA_REST_AUTHENTICATION_METHOD: 'BASIC'
      KAFKA_KAFKA_REST_AUTHENTICATION_REALM: 'KafkaRest'
      KAFKA_KAFKA_REST_AUTHENTICATION_ROLES: 'Administrators'
      # Single-broker: all Confluent internal topics must use RF=1 (default 3).
      KAFKA_CONFLUENT_CLUSTER_LINK_METADATA_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_COMMAND_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_TELEMETRY_METRICS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_BALANCER_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_BALANCER_ENABLE: 'false'

  # ---------------------------------------------------------------------------
  # dest-mtls: destination broker whose embedded Admin REST API runs over HTTPS
  # with mutual TLS — client.authentication=REQUIRED means a caller must present
  # a client cert signed by the CA the truststore trusts (the kcp client cert).
  # Auth is the TLS client cert; no Authorization header (NoHeaderAuth).
  # ---------------------------------------------------------------------------
  dest-mtls:
    image: confluentinc/cp-server:8.1.2
    hostname: dest-mtls
    container_name: kcp-mcl-dest-mtls
    ports: ["29292:29292", "28092:8090"]
    volumes: ["./certs:/etc/kafka/secrets"]
    environment:
      CLUSTER_ID: 'CA6bwVKcQR_Mn-E_v1oPlw'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@dest-mtls:29093'
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:39092,CONTROLLER://0.0.0.0:29093,HOST://0.0.0.0:29292'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://dest-mtls:39092,HOST://localhost:29292'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CONFLUENT_CLUSTER_LINK_ENABLE: 'true'
      # HTTPS embedded REST listener with mutual TLS (verified against CP docs).
      KAFKA_CONFLUENT_HTTP_SERVER_LISTENERS: 'https://0.0.0.0:8090'
      KAFKA_CONFLUENT_HTTP_SERVER_SSL_KEYSTORE_LOCATION: '/etc/kafka/secrets/dest.keystore.jks'
      KAFKA_CONFLUENT_HTTP_SERVER_SSL_KEYSTORE_PASSWORD: 'keystorepass'
      KAFKA_CONFLUENT_HTTP_SERVER_SSL_KEY_PASSWORD: 'keystorepass'
      KAFKA_CONFLUENT_HTTP_SERVER_SSL_TRUSTSTORE_LOCATION: '/etc/kafka/secrets/dest.truststore.jks'
      KAFKA_CONFLUENT_HTTP_SERVER_SSL_TRUSTSTORE_PASSWORD: 'truststorepass'
      KAFKA_CONFLUENT_HTTP_SERVER_SSL_CLIENT_AUTHENTICATION: 'REQUIRED'
      # Single-broker: all Confluent internal topics must use RF=1 (default 3).
      KAFKA_CONFLUENT_CLUSTER_LINK_METADATA_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_COMMAND_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_TELEMETRY_METRICS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_BALANCER_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_BALANCER_ENABLE: 'false'

  # ---------------------------------------------------------------------------
  # dest-bearer: destination broker running the Metadata Service (MDS) as an
  # RBAC token issuer. KCP authenticates to MDS (basic, file user store) to mint
  # a JWT, then calls the embedded REST API with `Authorization: Bearer <jwt>`
  # (BearerAuth). The embedded REST API verifies the JWT with the MDS public key
  # and authorizes via the ConfluentServerAuthorizer. The MDS HTTP server serves
  # both /security/1.0/* (MDS) and /kafka/v3/* (REST) on one listener.
  # ---------------------------------------------------------------------------
  dest-bearer:
    image: confluentinc/cp-server:8.1.2
    hostname: dest-bearer
    container_name: kcp-mcl-dest-bearer
    ports: ["29392:29392", "28093:8090"]
    volumes: ["./certs:/etc/kafka/secrets", "./rest-auth:/etc/kafka/rest-auth"]
    environment:
      CLUSTER_ID: 'nCfjnCUInkjOvoJqi621RA'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@dest-bearer:29093'
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:39092,CONTROLLER://0.0.0.0:29093,HOST://0.0.0.0:29392'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://dest-bearer:39092,HOST://localhost:29392'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CONFLUENT_CLUSTER_LINK_ENABLE: 'true'
      # --- RBAC authorizer. INTERNAL/CONTROLLER are PLAINTEXT => the broker's own
      # principal is User:ANONYMOUS, which must be a super user or the broker
      # cannot operate once the authorizer is on. User:kcp is the bearer principal.
      KAFKA_AUTHORIZER_CLASS_NAME: 'io.confluent.kafka.security.authorizer.ConfluentServerAuthorizer'
      KAFKA_CONFLUENT_AUTHORIZER_ACCESS_RULE_PROVIDERS: 'CONFLUENT'
      KAFKA_SUPER_USERS: 'User:ANONYMOUS;User:kcp'
      # --- Metadata Service (MDS) as token issuer, file-based user store.
      KAFKA_CONFLUENT_METADATA_SERVER_LISTENERS: 'http://0.0.0.0:8090'
      KAFKA_CONFLUENT_METADATA_SERVER_ADVERTISED_LISTENERS: 'http://dest-bearer:8090'
      # BEARER turns on MDS basic-auth (to the file user store) + token
      # generation/validation; without it authentication.method=NONE and the
      # /security/1.0/authenticate token endpoint is not mounted (404).
      KAFKA_CONFLUENT_METADATA_SERVER_AUTHENTICATION_METHOD: 'BEARER'
      KAFKA_CONFLUENT_METADATA_SERVER_TOKEN_KEY_PATH: '/etc/kafka/secrets/tokenKeypair.pem'
      KAFKA_CONFLUENT_METADATA_SERVER_USER_STORE: 'FILE'
      KAFKA_CONFLUENT_METADATA_SERVER_USER_STORE_FILE_PATH: '/etc/kafka/rest-auth/mds-users.properties'
      # Single-broker: the RBAC auth store topic _confluent-metadata-auth defaults
      # to RF=3 and never initializes on one broker without this.
      KAFKA_CONFLUENT_METADATA_TOPIC_REPLICATION_FACTOR: 1
      # --- Embedded REST API verifies bearer JWTs against the MDS public key and
      # installs the bearer-or-basic security handler.
      KAFKA_KAFKA_REST_REST_SERVLET_INITIALIZOR_CLASSES: 'io.confluent.common.security.jetty.initializer.InstallBearerOrBasicSecurityHandler'
      KAFKA_KAFKA_REST_PUBLIC_KEY_PATH: '/etc/kafka/secrets/tokenPublicKey.pem'
      KAFKA_KAFKA_REST_CONFLUENT_METADATA_BOOTSTRAP_SERVER_URLS: 'http://dest-bearer:8090'
      # Single-broker: all Confluent internal topics must use RF=1 (default 3).
      KAFKA_CONFLUENT_CLUSTER_LINK_METADATA_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_COMMAND_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_TELEMETRY_METRICS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_BALANCER_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_BALANCER_ENABLE: 'false'
