# Confluent Platform target credentials. The Phase-1 docker env runs the
# embedded Admin REST API without auth (KAFKA_CONFLUENT_HTTP_SERVER_AUTHENTICATION_METHOD
# is not set), so this basic block is accepted but not verified by the broker;
# it exercises the credentials-loading path. Real basic/mTLS/bearer REST auth
# is covered in a later auth phase.
basic:
  username: admin
  password: admin-secret
