apiVersion: kcp.confluent.io/v1alpha1
kind: Migration
metadata:
  name: mcl-e2e-target-basic
spec:
  source:
    type: apache-kafka
    credentials: ./testdata/plaintext/source-creds.yaml
  target:
    type: confluent-platform
    credentials: ./testdata/target-basic/target-creds.yaml
    kafka:
      # dest-basic: embedded Admin REST API requires HTTP Basic auth.
      restEndpoint: http://localhost:28091
      bootstrapServers: ["localhost:29192"]
  clusterLink:
    name: tgt-basic
    configs:
      bootstrap.servers: source:29092
