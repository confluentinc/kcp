apiVersion: kcp.confluent.io/v1alpha1
kind: Migration
metadata:
  name: mcl-e2e
spec:
  source:
    type: apache-kafka
    credentials: ./testdata/plaintext/source-creds.yaml
  target:
    type: confluent-platform
    credentials: ./testdata/target-creds.yaml
    kafka:
      restEndpoint: http://localhost:28090
      bootstrapServers: ["localhost:29092"]
  clusterLink:
    name: src-to-dest
    configs:
      # The link runs on the dest broker and must reach the source on the
      # docker network (source:29092), which differs from the host address
      # KCP itself uses to read the source (localhost:19092). This override
      # replaces the derived bootstrap.servers.
      bootstrap.servers: source:29092
