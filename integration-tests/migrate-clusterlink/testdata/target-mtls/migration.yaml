apiVersion: kcp.confluent.io/v1alpha1
kind: Migration
metadata:
  name: mcl-e2e-target-mtls
spec:
  source:
    type: apache-kafka
    credentials: ./testdata/plaintext/source-creds.yaml
  target:
    type: confluent-platform
    credentials: ./testdata/target-mtls/target-creds.yaml
    kafka:
      # dest-mtls: HTTPS embedded REST API, client.authentication=REQUIRED.
      restEndpoint: https://localhost:28092
      bootstrapServers: ["localhost:29292"]
  clusterLink:
    name: tgt-mtls
    configs:
      bootstrap.servers: source:29092
