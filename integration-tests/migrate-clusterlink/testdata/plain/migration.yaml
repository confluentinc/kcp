apiVersion: kcp.confluent.io/v1alpha1
kind: Migration
metadata:
  name: mcl-plain
spec:
  source:
    type: apache-kafka
    credentials: ./testdata/plain/source-creds.yaml
  target:
    type: confluent-platform
    credentials: ./testdata/target-creds.yaml
    kafka:
      restEndpoint: http://localhost:28090
      bootstrapServers: ["localhost:29092"]
  clusterLink:
    name: plain
    configs:
      # The link runs on the dest broker; it reaches the source on the docker
      # network (source:29096), which differs from the host address KCP uses to read it.
      bootstrap.servers: source:29096
