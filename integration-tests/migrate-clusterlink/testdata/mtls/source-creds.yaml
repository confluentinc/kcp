clusters:
  - id: source
    bootstrap_servers: ["localhost:19094"]    # SSL host listener (client-auth requested)
    insecure_skip_tls_verify: true
    auth_method:
      tls:
        use: true
        ca_cert: ./certs/ca.crt
        client_cert: ./certs/client.crt
        client_key: ./certs/client.key
