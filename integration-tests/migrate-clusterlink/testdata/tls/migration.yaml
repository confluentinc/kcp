apiVersion: kcp.confluent.io/v1alpha1
kind: Migration
metadata:
  name: mcl-tls
spec:
  source:
    type: apache-kafka
    credentials: ./testdata/tls/source-creds.yaml
  target:
    type: confluent-platform
    credentials: ./testdata/target-creds.yaml
    kafka:
      restEndpoint: http://localhost:28090
      bootstrapServers: ["localhost:29092"]
  clusterLink:
    name: tlsenc
    configs:
      # The link runs on the dest broker; it reaches the source on the docker
      # network (source:29095), which differs from the host address KCP uses to read it.
      bootstrap.servers: source:29095
