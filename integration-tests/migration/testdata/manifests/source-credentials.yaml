apiVersion: v1
kind: Secret
metadata:
  name: source-plain-credential
  namespace: confluent
type: Opaque
stringData:
  plain-users.json: |
    {
      "admin": "admin-secret",
      "client": "client-secret"
    }
  plain.txt: |
    username=admin
    password=admin-secret
  plain-interbroker.txt: |
    username=admin
    password=admin-secret
