apiVersion: v1
kind: ServiceAccount
metadata:
  name: kcp-runner
  namespace: confluent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kcp-runner
  namespace: confluent
rules:
- apiGroups: ["platform.confluent.io"]
  resources: ["gateways"]
  verbs: ["get", "patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kcp-runner
  namespace: confluent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kcp-runner
subjects:
- kind: ServiceAccount
  name: kcp-runner
  namespace: confluent
---
apiVersion: v1
kind: Pod
metadata:
  name: kcp-runner
  namespace: confluent
  labels:
    app: kcp-runner
spec:
  serviceAccountName: kcp-runner
  containers:
  - name: runner
    image: alpine:3.20
    command: ["sleep", "infinity"]
    workingDir: /workspace
    volumeMounts:
    - name: workspace
      mountPath: /workspace
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
  volumes:
  - name: workspace
    emptyDir: {}
