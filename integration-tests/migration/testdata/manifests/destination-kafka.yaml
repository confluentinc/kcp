apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: destination-kafka
  namespace: confluent
spec:
  replicas: 1
  image:
    application: docker.io/confluentinc/cp-server:8.1.2
    init: confluentinc/confluent-init-container:3.2.1
  dataVolumeCapacity: 5Gi
  podTemplate:
    resources:
      requests:
        cpu: "200m"
        memory: "1Gi"
      limits:
        cpu: "1"
        memory: "2Gi"
  listeners:
    internal:
      authentication:
        type: plain
        jaasConfig:
          secretRef: destination-plain-credential
      tls:
        enabled: true
  tls:
    autoGeneratedCerts: true
  configOverrides:
    server:
      - cluster.link.metadata.topic.replication.factor=1
      - confluent.cluster.link.metadata.topic.replication.factor=1
      - confluent.telemetry.metrics.topic.replication.factor=1
      - offsets.topic.replication.factor=1
      - transaction.state.log.replication.factor=1
      - min.insync.replicas=1
  dependencies:
    kRaftController:
      clusterRef:
        name: destination-kraftcontroller
