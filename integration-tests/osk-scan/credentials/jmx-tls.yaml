clusters:
  - id: osk-kafka-jmx-tls
    bootstrap_servers:
      - localhost:9097
    auth_method:
      unauthenticated_plaintext:
        use: true
    jolokia:
      endpoints:
        - https://localhost:8780/jolokia
      auth:
        username: monitorUser
        password: monitorPass
      tls:
        insecure_skip_verify: true
    metadata:
      environment: test
      location: osk-scan
