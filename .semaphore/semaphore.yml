version: v1.0
name: build-test
agent:
  machine:
    type: s1-prod-ubuntu24-04-amd64-1

auto_cancel:
  running:
    when: "branch != 'main'"

execution_time_limit:
  hours: 1

queue:
  - when: "branch != 'main'"
    processing: parallel

global_job_config:
  prologue:
    commands:
      - sem-version node 24.6.0
      - npm install -g yarn@1.22.22
      - sem-version go 1.25.11
      - export "GOPATH=$(go env GOPATH)"
      - export "SEMAPHORE_GIT_DIR=${GOPATH}/src/github.com/confluentinc/${SEMAPHORE_PROJECT_NAME}"
      - export "PATH=${GOPATH}/bin:${PATH}"
      - mkdir -vp "${SEMAPHORE_GIT_DIR}" "${GOPATH}/bin"
      - checkout

blocks:
  - name: 'resolve frontend dependencies'
    dependencies: []
    task:
      jobs:
        - name: 'frontend dependencies'
          commands:
            - cache restore frontend-dependencies
            - cd cmd/ui/frontend && yarn install
      epilogue:
        on_pass:
          commands:
            - >-
              if [ "$SEMAPHORE_GIT_WORKING_BRANCH" = "main" ]; then
                cache delete frontend-dependencies;
                cache store frontend-dependencies node_modules/;
              fi

  - name: 'resolve go dependencies'
    dependencies: []
    task:
      jobs:
        - name: 'go dependencies'
          commands:
            - cache restore go-mod-cache
            - go mod download
      epilogue:
        on_pass:
          commands:
            - >-
              if [ "$SEMAPHORE_GIT_WORKING_BRANCH" = "main" ]; then
                cache delete go-mod-cache;
                cache store go-mod-cache "${GOPATH}/pkg/mod";
              fi

  - name: 'test'
    dependencies: ['resolve frontend dependencies', 'resolve go dependencies']
    task:
      jobs:
        - name: 'run tests'
          commands:
            - cache restore frontend-dependencies
            - cache restore go-mod-cache
            - cache restore go-build-cache
            - cd cmd/ui/frontend && yarn install && yarn build && cd -
            - (cd cmd/ui/frontend && npx playwright install chromium chromium-headless-shell --with-deps)
            - make test-go GOTEST_FLAGS="-p 1 -parallel 4 -count=1"
            - make test-playwright
      epilogue:
        on_pass:
          commands:
            - >-
              if [ "$SEMAPHORE_GIT_WORKING_BRANCH" = "main" ]; then
                cache delete go-build-cache;
                cache store go-build-cache "$HOME/.cache/go-build";
              fi

  - name: 'terraform validation tests'
    dependencies: ['resolve frontend dependencies', 'resolve go dependencies']
    task:
      prologue:
        commands:
          # Terraform is not pre-installed on Semaphore agents
          - curl -sLO https://releases.hashicorp.com/terraform/1.9.5/terraform_1.9.5_linux_amd64.zip
          - unzip -q terraform_1.9.5_linux_amd64.zip
          - sudo install terraform /usr/local/bin/terraform
          - terraform version
      jobs:
        - name: 'terraform validation'
          commands:
            - cache restore frontend-dependencies
            - cache restore go-mod-cache
            - cache restore go-build-cache
            - cd cmd/ui/frontend && yarn install && yarn build && cd -
            - make test-tf-validation GOTEST_FLAGS="-p 1 -parallel 4 -count=1"

  - name: 'integration: osk scan'
    dependencies: ['resolve frontend dependencies', 'resolve go dependencies']
    task:
      prologue:
        commands:
          # keytool (from JDK) is required for TLS certificate generation
          - sem-version java 17
      jobs:
        - name: 'osk scan'
          commands:
            - cache restore frontend-dependencies
            - cache restore go-mod-cache
            - cache restore go-build-cache
            - cd cmd/ui/frontend && yarn install && yarn build && cd -
            - make test-osk-scan

  - name: 'integration: schema registry scan'
    dependencies: ['resolve frontend dependencies', 'resolve go dependencies']
    task:
      jobs:
        - name: 'schema registry scan'
          commands:
            - cache restore frontend-dependencies
            - cache restore go-mod-cache
            - cache restore go-build-cache
            - cd cmd/ui/frontend && yarn install && yarn build && cd -
            - make test-schema-registry

  - name: 'integration: migration e2e'
    dependencies: ['resolve frontend dependencies', 'resolve go dependencies']
    task:
      agent:
        machine:
          type: s1-prod-ubuntu24-04-amd64-2
      prologue:
        commands:
          # Minikube is not pre-installed on Semaphore agents
          - curl -LO https://storage.googleapis.com/minikube/releases/v1.35.0/minikube-linux-amd64
          - sudo install minikube-linux-amd64 /usr/local/bin/minikube
          # Upgrade kubectl to v1.30.0 (agent has 1.23.6, we need 1.30.0 for K8s compatibility)
          - curl -LO "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
          - sudo install kubectl /usr/local/bin/kubectl
          # Restore cached minikube preloads (K8s tarballs) to skip re-download
          - cache restore minikube-cache
      jobs:
        - name: 'migration e2e'
          commands:
            - cache restore frontend-dependencies
            - cache restore go-mod-cache
            - cache restore go-build-cache
            - cd cmd/ui/frontend && yarn install && yarn build && cd -
            - make test-migration-setup
            - make test-migration
      epilogue:
        always:
          commands:
            - make test-migration-teardown
        on_pass:
          commands:
            - cache store minikube-cache ~/.minikube/cache/

  - name: 'static analysis'
    dependencies: ['resolve frontend dependencies', 'resolve go dependencies']
    task:
      env_vars:
        - name: TRIVY_DB_REPOSITORIES
          value: 'ghcr.io/aquasecurity/trivy-db,public.ecr.aws/aquasecurity/trivy-db'
      prologue:
        commands:
          - sem-version go 1.25.11
          - export "GOPATH=$(go env GOPATH)"
          - export "SEMAPHORE_GIT_DIR=${GOPATH}/src/github.com/confluentinc/${SEMAPHORE_PROJECT_NAME}"
          - export "PATH=${GOPATH}/bin:${PATH}"
          - mkdir -vp "${SEMAPHORE_GIT_DIR}" "${GOPATH}/bin"
          - cache restore frontend-dependencies
          - cache restore go-mod-cache
          - cache restore go-build-cache
          - cd cmd/ui/frontend && yarn install && yarn build && cd -
      jobs:
        - name: 'golangci-lint'
          commands:
            - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.11.3/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.11.3
            - git fetch origin main
            - golangci-lint run --config .golangci.yml ./...

        - name: 'trivy scan'
          commands:
            - trivy fs --scanners vuln --show-suppressed --db-repository=$TRIVY_DB_REPOSITORIES --severity HIGH,CRITICAL --exit-code 1 .

  - name: 'docs build'
    dependencies: ['resolve go dependencies']
    task:
      prologue:
        commands:
          - sem-version python 3.12
      jobs:
        - name: 'docs build'
          commands:
            - cache restore go-mod-cache
            - cache restore go-build-cache
            # gen-docs embeds cmd/ui/frontend/dist via go:embed; the command
            # reference is pure Cobra output and needs no real assets, so a stub
            # lets it compile without the full frontend build.
            - mkdir -p cmd/ui/frontend/dist && echo '<!doctype html>' > cmd/ui/frontend/dist/index.html
            # Builds a throwaway venv from requirements-docs.txt (no stale cache) and
            # runs `mkdocs build --strict` — catches dependency-resolution conflicts
            # and breaking extension changes before they reach contributors.
            - make docs-build
