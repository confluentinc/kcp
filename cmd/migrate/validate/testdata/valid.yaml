apiVersion: kcp.confluent.io/v1alpha1
kind: Migration
metadata:
  name: example-migration
spec:
  source:
    type: apache-kafka
    credentials: ./source-creds.yaml
  target:
    type: confluent-cloud
    cluster: lkc-xxxxx
    credentials: ./target-creds.yaml
  clusterLink:
    name: source-to-cc
    sourceCredentials: ./link-source-creds.yaml
  topics:
    mode: mirror
    include: ["*"]
