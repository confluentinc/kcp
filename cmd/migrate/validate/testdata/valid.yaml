apiVersion: kcp.confluent.io/v1alpha1
kind: Migration
metadata:
  name: example-migration
spec:
  source:
    type: apache-kafka
    bootstrapServers: ["broker1:9092"]
    credentials: ./source-creds.yaml
  target:
    type: confluent-cloud
    clusterId: lkc-xxxxx
    credentials: ./target-creds.yaml
  clusterLink:
    name: source-to-cc
    source:
      bootstrapServers: ["broker1:9092"]
      credentials: ./link-source-creds.yaml
  topics:
    mode: mirror
    include: ["*"]
