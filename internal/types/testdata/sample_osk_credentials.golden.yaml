clusters:
- id: osk-prod-1
  bootstrap_servers:
  - broker-1:9092
  - broker-2:9092
  auth_method:
    sasl_scram:
      use: true
      username: kcp
      password: redacted
      mechanism: SHA256
  metadata:
    environment: production
    location: dc-1
  jolokia:
    endpoints:
    - http://broker-1:8778/jolokia
    auth:
      username: monitor
      password: redacted
- id: osk-prod-2
  bootstrap_servers:
  - broker-3:9092
  auth_method:
    tls:
      use: true
      ca_cert: /etc/kcp/ca.pem
      client_cert: /etc/kcp/client.pem
      client_key: /etc/kcp/client.key
  prometheus:
    url: http://prom:9090
    auth:
      username: promuser
      password: redacted
