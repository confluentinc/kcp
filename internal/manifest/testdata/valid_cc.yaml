apiVersion: kcp.confluent.io/v1alpha1
kind: Migration
metadata:
  name: example-migration
spec:
  source:
    type: apache-kafka
    bootstrapServers: ["broker1:9092", "broker2:9092"]
    credentials: ./source-creds.yaml
  target:
    type: confluent-cloud
    clusterId: lkc-xxxxx
    credentials: ./target-creds.yaml
    kafka:
      restEndpoint: https://pkc-1n6m13.us-east-1.aws.confluent.cloud:443
  clusterLink:
    name: source-to-cc
    mode: destination
    source:
      bootstrapServers: ["broker1:9092"]
      credentials: ./source-creds.yaml
    prefix: "src."
    configs:
      consumer.offset.sync.enable: "true"
  topics:
    mode: mirror
    include: ["*"]
    exclude: ["__consumer_offsets", "_schemas"]
  acls:
    include: ["*"]
  schemas:
    include: ["*"]
