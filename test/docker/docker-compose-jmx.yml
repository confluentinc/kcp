version: '3.8'

services:
  kafka-jmx:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka-jmx
    container_name: kcp-test-kafka-jmx
    ports:
      - "9096:9096"
      - "8778:8778"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-jmx:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka-jmx:29092,CONTROLLER://kafka-jmx:29093,PLAINTEXT_HOST://0.0.0.0:9096'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-jmx:29092,PLAINTEXT_HOST://localhost:9096'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'JkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: 'true'
      KAFKA_SUPER_USERS: 'User:ANONYMOUS'
      KAFKA_OPTS: '-javaagent:/tmp/jolokia-agent.jar=port=8778,host=0.0.0.0'
    command: >
      bash -c "
        curl -sSL https://repo1.maven.org/maven2/org/jolokia/jolokia-jvm/1.7.2/jolokia-jvm-1.7.2.jar -o /tmp/jolokia-agent.jar
        kafka-storage format -t JkU3OEVBNTcwNTJENDM2Qk -c /etc/kafka/kafka.properties --ignore-formatted 2>/dev/null || true
        /etc/confluent/docker/run
      "
    networks:
      - kcp-test-network

  kafka-jmx-producer:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kcp-test-kafka-jmx-producer
    depends_on:
      - kafka-jmx
    command:
      - bash
      - -c
      - |
        cub kafka-ready -b kafka-jmx:29092 1 60
        kafka-producer-perf-test --topic test-topic-1 --throughput 10 --num-records 999999999 --record-size 100 --producer-props bootstrap.servers=kafka-jmx:29092
    networks:
      - kcp-test-network

  kafka-jmx-consumer:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kcp-test-kafka-jmx-consumer
    depends_on:
      - kafka-jmx
    command:
      - bash
      - -c
      - |
        cub kafka-ready -b kafka-jmx:29092 1 60
        kafka-console-consumer --bootstrap-server kafka-jmx:29092 --topic test-topic-1 --group jmx-test-consumer > /dev/null
    networks:
      - kcp-test-network

networks:
  kcp-test-network:
    driver: bridge
