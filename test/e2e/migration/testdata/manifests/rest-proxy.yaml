apiVersion: platform.confluent.io/v1beta1
kind: KafkaRestProxy
metadata:
  name: destination-restproxy
  namespace: confluent
spec:
  replicas: 1
  image:
    application: docker.io/confluentinc/cp-kafka-rest:8.1.2
    init: confluentinc/confluent-init-container:3.2.1
  podTemplate:
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  tls:
    autoGeneratedCerts: true
  dependencies:
    kafka:
      bootstrapEndpoint: destination-kafka.confluent.svc.cluster.local:9071
      authentication:
        type: plain
        jaasConfig:
          secretRef: destination-plain-credential
      tls:
        enabled: true
