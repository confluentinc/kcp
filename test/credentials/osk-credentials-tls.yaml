clusters:
  - id: test-kafka-tls
    bootstrap_servers:
      - localhost:9094
    auth_method:
      tls:
        use: true
        ca_cert: test/docker/certs/ca-cert.pem
        client_cert: test/docker/certs/client-cert.pem
        client_key: test/docker/certs/client-key.pem
    metadata:
      environment: test
      location: docker-local-tls
