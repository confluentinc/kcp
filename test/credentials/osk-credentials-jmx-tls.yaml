clusters:
  - id: test-kafka-jmx-tls
    bootstrap_servers:
      - localhost:9098
    auth_method:
      unauthenticated_plaintext:
        use: true
    jolokia:
      endpoints:
        - https://localhost:8780/jolokia
      auth:
        username: monitorUser
        password: monitorPass
      tls:
        ca_cert: test/docker/certs/ca-cert.pem
        insecure_skip_verify: true
    metadata:
      environment: test
      location: docker-local-jmx-tls
