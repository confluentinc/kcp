clusters:
  - id: test-kafka-jmx
    bootstrap_servers:
      - localhost:9096
    auth_method:
      unauthenticated_plaintext:
        use: true
    prometheus:
      url: https://localhost:9192
      auth:
        username: promuser
        password: prompass
      tls:
        insecure_skip_verify: true
    metadata:
      environment: test
      location: docker-local-prometheus-tls
