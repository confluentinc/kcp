# plan-inputs.yaml — per-customer overrides for `kcp report plan`.
#
# All top-level fields are optional. Pinned defaults live in plan-config.yaml
# (embedded in the KCP binary). A missing field falls back to its default.
#
# Field groups:
#   - sizing knobs
#   - customer-declared hard requirements that force Dedicated
#   - existing VPC connectivity for the Dedicated networking path
#   - networking triggers that flip the AWS-Enterprise default from PNI to PrivateLink
#   - cutover approach + gateway prereqs
#   - client auth migration (target auth, per-cluster overrides)
#   - schema migration (strategy + CP/edition/reachability for Schema Linking)
#   - per-cluster facts (`clusters:` block) — either OVERLAY a scanned
#     cluster or SYNTHESISE one when no scan file is available
#
# Usage:
#   # From a kcp scan (with your overrides):
#   kcp report plan \
#     --state-file kcp-state.json \
#     --plan-inputs plan-inputs.yaml \
#     --output-dir ./plan-output
#
#   # From manual inputs (no scan file).
#   # Requires at least one entry under `clusters:` with a `region`.
#   kcp report plan \
#     --plan-inputs plan-inputs.yaml \
#     --output-dir ./plan-output

# ---------------------------------------------------------------------------
# Sizing overrides
# ---------------------------------------------------------------------------
# sla_target: "99.9"                  # 99.9 (default) | 99.95 | 99.99
# sizing_percentile: p95              # p95 (default) | p99 | max — lowercase per Confluent dashboards
# headroom_fraction: 0.30             # default 0.30 — extra capacity above the chosen percentile
# spiky_workload_ratio: 2.0           # default 2.0 (peak / P95 ratio above which a workload is flagged "spiky")

# ---------------------------------------------------------------------------
# Customer-declared hard requirements (force Dedicated)
# ---------------------------------------------------------------------------
# Most customers say `false` for all three. Setting any to `true` flips the
# verdict from Enterprise to Dedicated (higher monthly cost) — the Plan
# surfaces a ⚠ cost callout on the verdict when one of these fires.
# Ask your Confluent account team if you're unsure.
#
# enforce_schemas_at_the_broker: false              # true → broker rejects records without a registered schema
# requires_high_throughput_rest_produce_api: false  # true → producing over Kafka REST Produce v3 at high throughput
# requires_99_95_sla_within_a_single_zone: false    # true → Dedicated Single-Zone 99.95% SLA (different from sla_target)

# Target cloud is implicit AWS for MSK migrations. Override only when
# consolidating to Azure / GCP — non-AWS targets land on PrivateLink and
# require Dedicated when the source uses mTLS auth.
# target_cloud: aws                   # aws (default) | azure | gcp

# ---------------------------------------------------------------------------
# Existing VPC connectivity (Dedicated-path networking)
# ---------------------------------------------------------------------------
# If your apps already reach MSK via Transit Gateway or VPC Peering today,
# the same pattern is the path of least resistance on Confluent Cloud — but
# both options are Dedicated-only. On Enterprise the Plan picks between
# PrivateLink and PNI based on the triggers below.
#
# existing_vpc_connectivity: privatelink_or_pni  # privatelink_or_pni (default) | transit_gateway | vpc_peering

# ---------------------------------------------------------------------------
# Networking triggers — Enterprise PNI → PrivateLink flip
# ---------------------------------------------------------------------------
# PNI is the AWS-Enterprise default. PrivateLink fires when one of these
# triggers is set, or when `target_cloud != aws`.
#
# cc_egress_required: false           # true → CC-side workloads need to push traffic back into customer VPCs (PNI doesn't natively support this)
# projected_pni_gateway_count: 1      # ≥2 → flip to PrivateLink

# ---------------------------------------------------------------------------
# Cutover approach
# ---------------------------------------------------------------------------
# downtime_tolerance drives the cutover style. Pick the value that matches
# your operational constraint; the Plan maps it 1:1 to a recommended style.
#   zero                          → Blue/Green (parallel run via Cluster Linking)
#   seconds_per_service           → Stop-Restart-Repeat — REQUIRES the CC Gateway
#   minutes_per_service           → Stop-Restart-Repeat — gateway optional
#   scheduled_window_sequential   → Stop-Wait-Restart (one window, services rolled in sequence)
#   scheduled_window_all_at_once  → Restart-All-At-Once (one window, every client flips at once)
#   let_confluent_choose          → Stop-Restart-Repeat (Confluent's recommended default)
#
# downtime_tolerance: let_confluent_choose
# sub_pattern: app-by-app             # app-by-app (default) | topic-by-topic — only used with Stop-Restart-Repeat

# CC Gateway opt-out. Default true follows Confluent's canonical
# recommendation; set false to use plain Cluster Linking even when eligible.
# prefer_gateway: true

# Gateway prereq statuses. All three default to `not_started`. Move to
# `in_progress` to declare intent, `complete` once the prereq is satisfied.
# The Plan can recommend the canonical gateway-mediated path only when all
# applicable prereqs are at `in_progress` or `complete` (the IAM prereq is
# only consulted if IAM is detected on any source cluster).
#
# confluent_for_kubernetes_status: not_started   # not_started | in_progress | complete
# cc_gateway_license_status: not_started         # not_started | in_progress | complete
# iam_pre_migration_status: not_started          # not_started | in_progress | complete

# ---------------------------------------------------------------------------
# Client auth migration
# ---------------------------------------------------------------------------
# Target auth for ALL source auths detected on every cluster. Leave unset
# to use the per-source default from the embedded auth_mapping table
# (SCRAM → API Keys, IAM → API Keys, mTLS → mTLS, Unauth → API Keys).
# Set when you want a single target enforced across every detected source
# auth — e.g. consolidating onto OAuth.
#
# target_auth_method: ""              # "" (default; per-source mapping) | confluent_cloud_api_keys | mtls | oauth

# ---------------------------------------------------------------------------
# Per-cluster facts (`clusters:` block)
# ---------------------------------------------------------------------------
# Each key under `clusters:` is a source cluster Name. Two modes:
#
#   1. OVERLAY — when a scan file is provided AND the name matches a
#      scanned cluster, declared fields overlay on top of the scan;
#      undeclared fields keep their scan values.
#
#   2. SYNTHESISE — when no scan file is provided (or the name doesn't
#      match a scanned cluster), kcp builds a fresh cluster from the
#      declaration. Synthesis requires `region`; entries without it
#      are dropped. Per-cluster Cutover / Sizing / Auth / SLA overrides
#      (downtime_tolerance, sla_target, target_auth_method, etc.) layer
#      on top of the global defaults exactly as in OVERLAY mode.
#
# Minimum for a useful synthesised verdict (anything missing falls
# through to the matching scan-gap Open Question — the Plan still
# renders, just with degraded confidence on the affected sections):
#
#   region              — REQUIRED for synthesis.
#   cluster_type        — PROVISIONED (default) | SERVERLESS.
#   auth_methods        — subset of {scram, iam, mtls, unauth}. Without
#                         this, `auth_posture_unknown` fires.
#   broker_count        — drives §1 + cap rules. Without this,
#                         `broker_inventory_empty` fires.
#   peak_ingress_mbps   — drives Sizing. Without it, sizing falls back
#   peak_egress_mbps      to the SLA floor and `degraded_sizing` fires.
#   partition_count     — drives the partition-cap rule.
#   topic_count         — surfaces in §1.
#   acl_count           — drives `acl_count_exceeds_cap`. Omit to suppress
#                         the rule (then `acls_not_scanned` fires).
#
# Drives Red Flags / Effort signals (optional but valuable):
#
#   kafka_version       — Red Flag #2 (version floor).
#   broker_instance_type — Express tier Red Flag + cost reconciliation.
#   storage_mode        — LOCAL (default) | TIERED. Drives the
#                         Tiered Storage section + Red Flag #12.
#
# Decision-level per-cluster overrides (also valid in OVERLAY mode):
#
#   sla_target, headroom_fraction, sizing_percentile (not per-cluster),
#   downtime_tolerance, sub_pattern, target_auth_method,
#   enforce_schemas_at_the_broker, requires_high_throughput_rest_produce_api,
#   requires_99_95_sla_within_a_single_zone, target_cloud,
#   existing_vpc_connectivity, cc_egress_required, projected_pni_gateway_count.
#
# Worked example — single Provisioned cluster, no scan file:
#
# clusters:
#   payments-prod:
#     region: us-east-1
#     cluster_type: PROVISIONED                    # PROVISIONED (default) | SERVERLESS
#     kafka_version: "3.6.0"
#     broker_count: 12
#     broker_instance_type: kafka.m7g.4xlarge
#     storage_mode: TIERED                         # LOCAL (default) | TIERED
#     auth_methods: [scram, mtls]                  # subset of {scram, iam, mtls, unauth}
#     peak_ingress_mbps: 320
#     peak_egress_mbps: 880
#     p95_ingress_mbps: 180                        # optional; defaults to peak when unset
#     p95_egress_mbps: 520
#     partition_count: 4800
#     topic_count: 180
#     acl_count: 240
#     # Decision-level per-cluster overrides (optional):
#     sla_target: "99.95"
#     downtime_tolerance: minutes_per_service
#     target_auth_method: confluent_cloud_api_keys
#
# Multi-cluster, mixed-tier fleet:
#
# clusters:
#   events-streaming:
#     region: us-west-2
#     cluster_type: PROVISIONED
#     broker_count: 6
#     broker_instance_type: kafka.m7g.2xlarge
#     auth_methods: [iam]
#     peak_ingress_mbps: 120
#     peak_egress_mbps: 360
#     partition_count: 1200
#     topic_count: 60
#     acl_count: 0                                 # IAM-only cluster — 0 ACLs is correct
#   experiments:
#     region: us-west-2
#     cluster_type: SERVERLESS                     # Serverless: IAM-only, partition cap 120
#     auth_methods: [iam]
#     partition_count: 80
#     topic_count: 24
#
# clusters: {}
