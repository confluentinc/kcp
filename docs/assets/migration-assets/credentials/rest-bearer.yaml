# Bearer token — REST credentials (e.g. an MDS / OAuth token).
#
# Usable in REST slots (spec.target.credentials, spec.clusterLink.sourceRest.credentials).
bearer:
  token: <your-oauth-bearer-token>   # required
  # ca_cert: ./ca.pem             # optional — verify a private/internal CA
  # insecure_skip_verify: false   # optional — test environments only
