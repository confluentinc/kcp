# Confluent Cloud API key — REST credentials (Kafka Admin REST / Cluster Links API).
#
# Usable in REST slots:
#   - spec.target.credentials                    (Confluent Cloud target)
#   - spec.clusterLink.sourceRest.credentials    (source-initiated mode)
#
# api_key + api_secret are a top-level pair (no nested block). Both must be set or
# both omitted. Validates against the system trust store (public CA) — no ca_cert.
api_key: <your-confluent-cloud-api-key>
api_secret: <your-confluent-cloud-api-secret>
