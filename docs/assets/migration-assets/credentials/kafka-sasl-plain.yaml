# SASL/PLAIN — Kafka credentials.
#
# TLS behaviour is driven by ca_cert:
#   - ca_cert present → SASL_SSL        (TLS; the supplied CA is trusted)
#   - ca_cert absent  → SASL_PLAINTEXT  (no TLS — test/lab listeners only)
#
# Usable in any Kafka slot (source, clusterLink.source, clusterLink.destination).
sasl_plain:
  username: admin
  password: secret
  ca_cert: ./ca.pem   # present ⇒ SASL_SSL over a private/internal CA.
                      # Remove it for a plaintext (non-TLS) test listener.
