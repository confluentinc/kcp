# yaml-language-server: $schema=https://raw.githubusercontent.com/confluentinc/kcp/main/internal/manifest/migration.schema.json
# migration.yaml — describes the desired end state of a migration.
# Apply with: kcp migrate validate -f migration.yaml   (then, later phases, apply/status)
apiVersion: kcp.confluent.io/v1alpha1
kind: Migration
metadata:
  name: msk-prod-to-confluent-cloud
spec:
  source:
    type: apache-kafka
    bootstrapServers: ["broker1:9092", "broker2:9092"]   # source Kafka address (not a secret)
    credentials: ./source-creds.yaml                     # auth-only; no secrets in this manifest

  target:
    type: confluent-cloud                  # or: confluent-platform
    clusterId: lkc-xxxxx
    credentials: ./target-creds.yaml
    kafka:
      restEndpoint: https://pkc-1n6m13.us-east-1.aws.confluent.cloud:443

  clusterLink:
    name: source-to-cc
    mode: destination                      # destination (default) | source
    source:                                # link→source Kafka connection (destination mode)
      bootstrapServers: ["broker1:9092"]   # link dials this address
      credentials: ./source-creds.yaml    # auth-only credentials for the link
    # prefix: "clusterA."                  # optional; cluster.link.prefix — mirror names become prefix+source (immutable once created)
    consumerOffsetSync:                    # migrate consumer offsets (enabled by default)
      enable: true
      # intervalMs: 30000                  # optional; omit for server default (30s)
      # groupFilters:                      # optional; omit → all groups synced
      #   - { name: "*", patternType: LITERAL, filterType: INCLUDE }
    # topicConfigSync:
    #   intervalMs: 30000                  # optional; omit for server default
    # Source-initiated alternative — for a private/firewalled Confluent source the
    # destination cannot reach inbound (requires spec.source.type: confluent-platform).
    # Replace the clusterLink block above with:
    #   mode: source
    #   sourceRest:                              # KCP → source REST (creates the source-side link)
    #     endpoint: https://source:8090
    #     credentials: ./source-rest-creds.yaml
    #   destination:                             # source-side link → destination Kafka
    #     bootstrapServers: ["dest:9092"]
    #     credentials: ./dest-creds.yaml

  topics:
    mode: mirror                           # mirror | new
    # mirror: create read-only mirror topics on the cluster link (requires spec.clusterLink).
    #         Mirror names are <clusterLink.prefix>+<sourceName> (no prefix → same name).
    # new:    create plain topics directly on the target, reproducing the source topic's
    #         partition count, replication factor, and explicitly-set configs. Needs NO link.
    #         For mode: new, drop the clusterLink block and use, e.g.:
    #           topics: { mode: new, include: ["orders.*"], exclude: ["*.tmp"] }
    include: ["*"]                          # globs (path.Match) matched against the live source topic list
    exclude: ["*.internal"]                 # optional globs; internal topics (names starting with "_") are always auto-excluded

  acls:
    include: ["*"]

  schemas:
    include: ["*"]
